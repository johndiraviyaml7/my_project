# Server Configuration
server.port=8444
server.ssl.enabled=true
server.ssl.key-store=classpath:certs/server.p12
server.ssl.key-store-password=dicom
server.ssl.key-store-type=PKCS12
server.ssl.trust-store=classpath:certs/truststore.jks
server.ssl.trust-store-password=dicom2
spring.application.name=EdgeConnector

# File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# MQTT Configuration (WSS)
mqtt.broker.url=wss://localhost:9001/mqtt
mqtt.client.id=EdgeConnector-${random.uuid}
mqtt.username=edge_user
mqtt.password=edge_password
mqtt.qos=1
mqtt.keep-alive-interval=60
mqtt.connection-timeout=30
mqtt.clean-session=false

# MQTT Topics
mqtt.topic.connectivity=edge/connectivity/status
mqtt.topic.lwt=edge/connectivity/lwt
mqtt.lwt.message={"status":"disconnected","reason":"ungraceful_termination","timestamp":""}
mqtt.heartbeat.interval-seconds=60

# SSL/TLS Configuration for MQTT WSS
mqtt.ssl.key-store=classpath:certs/client.p12
mqtt.ssl.key-store-password=dicom
mqtt.ssl.key-store-type=PKCS12
mqtt.ssl.trust-store=classpath:certs/truststore.jks
mqtt.ssl.trust-store-password=dicom2
mqtt.ssl.client-cert=classpath:certs/client.crt
mqtt.ssl.client-key=classpath:certs/client.key
mqtt.ssl.ca-cert=classpath:certs/ca.crt

# WebSocket Configuration
websocket.endpoint=/ws
websocket.allowed-origins=*

# PACS Upload API
pacs.upload.url=https://localhost:8443/api/dicom/upload
pacs.upload.ssl.verify=true

# DICOM Folder Watch
dicom.watch.folder=C:/dicom/inbox
dicom.watch.interval-ms=5000
dicom.processed.folder=C:/dicom/processed
dicom.failed.folder=C:/dicom/failed

# Logging
logging.level.com.edge=DEBUG
logging.level.org.eclipse.paho=INFO
logging.file.name=logs/edge-connector.log
logging.file.max-size=10MB
logging.file.max-history=7
