# =============================================================================
#  QuantixMed DICOM Platform — Unified Docker Compose
#  Target: Docker Desktop on Windows (WSL2 backend)
#
#  Services:
#    postgres            — PostgreSQL 16          :5432
#    orthanc             — Orthanc DICOM server   :8042 (HTTP)  :4242 (DICOM)
#    dicom_parser_api    — FastAPI (uploads)      :8000
#    parser_init         — One-shot pipeline run that walks PSMA_one_dicom,
#                           de-identifies, populates Postgres, uploads to Orthanc
#    springboot_backend  — Spring Boot REST API   :8080
#    ohif                — OHIF Viewer v3         :3000
#    reactjs_frontend    — React UI (nginx)       :5173
#
#  Bring up:           docker compose up -d --build
#  Run pipeline only:  docker compose run --rm parser_init
#  View logs:          docker compose logs -f
#  Tear down:          docker compose down
#  Tear down + wipe:   docker compose down -v
# =============================================================================

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: quantixmed_postgres
    environment:
      POSTGRES_DB:       quantixmed_dicom
      POSTGRES_USER:     postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d quantixmed_dicom"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped
    networks: [quantixmed_net]

  # ── Orthanc DICOM Server + DICOMweb ───────────────────────────────────
  orthanc:
    image: orthancteam/orthanc:latest
    container_name: quantixmed_orthanc
    ports:
      - "8042:8042"   # HTTP REST + DICOMweb
      - "4242:4242"   # DICOM protocol (DIMSE)
    volumes:
      - orthanc_db:/var/lib/orthanc/db
    environment:
      ORTHANC__NAME:                    "QuantixMed-Orthanc"
      ORTHANC__DICOM_AET:               "QUANTIXMED"
      ORTHANC__DICOM_PORT:              "4242"
      ORTHANC__AUTHENTICATION_ENABLED:  "true"
      ORTHANC__REGISTERED_USERS:        '{"admin":"admin"}'
      ORTHANC__REMOTE_ACCESS_ALLOWED:   "true"
      ORTHANC__HTTP_DESCRIBE_ERRORS:    "true"
      ORTHANC__DICOM_WEB__ENABLE:       "true"
      ORTHANC__DICOM_WEB__ROOT:         "/dicom-web/"
      ORTHANC__DICOM_WEB__ENABLE_WADO:  "true"
      ORTHANC__DICOM_WEB__WADO_ROOT:    "/wado"
      ORTHANC__DICOM_WEB__PUBLIC_ROOT:  "/dicom-web/"
      ORTHANC__CORS_ENABLED:            "true"
      ORTHANC__MAXIMUM_STORAGE_SIZE:    "0"
      ORTHANC__MAXIMUM_PATIENT_COUNT:   "0"
      ORTHANC__STORAGE_COMPRESSION:     "false"
      VERBOSE_ENABLED:                  "true"
    healthcheck:
      disable: true
    restart: unless-stopped
    networks: [quantixmed_net]

  # ── DICOM Parser API (FastAPI, long-running) ──────────────────────────
  dicom_parser_api:
    build:
      context: ./dicom_parser
      dockerfile: Dockerfile
    container_name: quantixmed_parser_api
    depends_on:
      postgres:
        condition: service_healthy
      orthanc:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: quantixmed_dicom
      DB_USER: postgres
      DB_PASSWORD: postgres
      ORTHANC_URL:      http://orthanc:8042
      ORTHANC_USER:     admin
      ORTHANC_PASSWORD: admin
      ORTHANC_AUTO_UPLOAD: "true"
      INPUT_DATA_DIR: /data/input
    ports:
      - "8000:8000"
    volumes:
      - ./PSMA_one_dicom:/data/input:ro     # raw DICOM input from host
      - deid_output:/app/output             # de-identified files (shared)
      - parser_logs:/app/logs
    restart: unless-stopped
    networks: [quantixmed_net]

  # ── Parser Init (one-shot pipeline) ───────────────────────────────────
  # Runs the full subject -> study -> series -> instance walk,
  # populates Postgres, de-identifies, and uploads to Orthanc.
  # Profile keeps it out of the default `up` set; run explicitly:
  #   docker compose run --rm parser_init
  parser_init:
    build:
      context: ./dicom_parser
      dockerfile: Dockerfile
    container_name: quantixmed_parser_init
    profiles: ["init"]
    depends_on:
      postgres:
        condition: service_healthy
      orthanc:
        condition: service_started
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: quantixmed_dicom
      DB_USER: postgres
      DB_PASSWORD: postgres
      ORTHANC_URL:      http://orthanc:8042
      ORTHANC_USER:     admin
      ORTHANC_PASSWORD: admin
      ORTHANC_AUTO_UPLOAD: "true"
      INPUT_DATA_DIR: /data/input
    volumes:
      - ./PSMA_one_dicom:/data/input:ro
      - deid_output:/app/output
      - parser_logs:/app/logs
    command: >
      python run_pipeline.py
        --psma-dir /data/input
        --device-name "PSMA-PET-CT PACS"
        --serial PSMA-PET-2026-001
    networks: [quantixmed_net]

  # ── Spring Boot Backend ───────────────────────────────────────────────
  springboot_backend:
    build:
      context: ./springboot_backend
      dockerfile: Dockerfile
    container_name: quantixmed_backend
    depends_on:
      postgres:
        condition: service_healthy
      orthanc:
        condition: service_started
    environment:
      # Spring Boot picks these up automatically (relaxed binding)
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/quantixmed_dicom
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
      APP_ORTHANC_URL:            http://orthanc:8042
      APP_ORTHANC_USERNAME:       admin
      APP_ORTHANC_PASSWORD:       admin
      APP_OHIF_VIEWER_URL:        http://localhost:3000
      APP_OHIF_DICOMWEB_ROOT:     http://localhost:8080/orthanc/dicom-web
      APP_CORS_ALLOWED_ORIGINS:   "http://localhost:5173,http://localhost:3000,http://localhost:8080"
    ports:
      - "8080:8080"
    volumes:
      - deid_output:/data/deid:ro    # backend can read de-identified files if needed
    restart: unless-stopped
    networks: [quantixmed_net]

  # ── OHIF Viewer ───────────────────────────────────────────────────────
  ohif:
    image: ohif/app:v3.9.0
    container_name: quantixmed_ohif
    depends_on:
      - orthanc
      - springboot_backend
    ports:
      - "3000:80"
    volumes:
      - ./orthanc_config_v4/ohif-app-config.js:/usr/share/nginx/html/app-config.js:ro
    restart: unless-stopped
    networks: [quantixmed_net]

  # ── React Frontend (nginx) ────────────────────────────────────────────
  reactjs_frontend:
    build:
      context: ./reactjs_frontend
      dockerfile: Dockerfile
    container_name: quantixmed_frontend
    depends_on:
      - springboot_backend
    ports:
      - "5173:80"
    restart: unless-stopped
    networks: [quantixmed_net]

  # ── PAS Connector (v5) ────────────────────────────────────────────────
  # mTLS REST API + embedded Moquette MQTT broker.
  # Edge devices register, upload DICOM zips, and publish connectivity
  # heartbeats + LWT + upload-status to MQTT topics.
  pas_connector:
    build:
      context: ./pas_connector
      dockerfile: Dockerfile
    container_name: quantixmed_pas
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_DATASOURCE_URL:      jdbc:postgresql://postgres:5432/quantixmed_dicom
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: postgres
    ports:
      - "8443:8443"   # HTTPS + mTLS (register / upload)
      - "8444:8444"   # Plain HTTP (React dashboard status polling)
      - "8883:8883"   # MQTT over TLS 1.3 (Edge Connector heartbeat/LWT)
      - "1883:1883"   # MQTT plain (intended for in-JVM self-subscriber only)
    volumes:
      - pas_uploads:/app/uploads
    restart: unless-stopped
    networks: [quantixmed_net]

# =============================================================================
volumes:
  pg_data:
  orthanc_db:
  deid_output:
  parser_logs:
  pas_uploads:

networks:
  quantixmed_net:
    driver: bridge
