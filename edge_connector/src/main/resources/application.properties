# ── Local HTTP server that the Swing UI calls ───────────────────
server.port=9090

# ── PAS Connector endpoints (the server we talk to over mTLS) ───
edge.pas.base-url=https://localhost:8443
edge.pas.mqtt-url=ssl://localhost:8883

# ── Client cert that identifies this edge device ────────────────
# The certs/ folder is placed next to the jar at runtime; Dockerfile
# or the run script rebuilds the p12/jks from PEMs with password "changeit".
edge.tls.keystore=certs/client.p12
edge.tls.keystore-password=changeit
edge.tls.truststore=certs/truststore.jks
edge.tls.truststore-password=changeit
edge.tls.protocol=TLSv1.3

# ── Heartbeat publish interval ──────────────────────────────────
edge.heartbeat.interval-seconds=10

# ── Upload (multipart) ──────────────────────────────────────────
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB

# ── Logging ─────────────────────────────────────────────────────
logging.level.com.quantixmed=DEBUG
spring.main.banner-mode=off
