# ── Server ──────────────────────────────────────────────────────
server.port=8080

# ── PostgreSQL ───────────────────────────────────────────────────
spring.datasource.url=jdbc:postgresql://localhost:5432/quantixmed_dicom
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ── JPA ──────────────────────────────────────────────────────────
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ── Connection Pool ───────────────────────────────────────────────
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

# ── Orthanc ──────────────────────────────────────────────────────
app.orthanc.url=http://localhost:8042
app.orthanc.username=admin
app.orthanc.password=admin

# ── OHIF Viewer ───────────────────────────────────────────────────
# DICOMweb root that OHIF uses — points to Spring Boot proxy, not Orthanc directly
app.ohif.viewer-url=http://localhost:3000
app.ohif.dicomweb-root=http://localhost:8080/orthanc/dicom-web

# ── Security ─────────────────────────────────────────────────────
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000,http://localhost:8080

# ── Proxy buffer size (needed for large DICOM files) ─────────────
spring.mvc.async.request-timeout=300000
server.tomcat.max-http-form-post-size=500MB
server.tomcat.max-swallow-size=500MB
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.quantixmed=DEBUG
logging.level.org.springframework.security=WARN
logging.level.org.springframework.web=INFO

# ── OpenAPI ──────────────────────────────────────────────────────
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
spring.main.banner-mode=off
