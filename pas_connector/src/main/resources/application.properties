# ── Server: HTTPS with mTLS on 8443 ─────────────────────────────
server.port=8443
server.ssl.enabled=true
server.ssl.protocol=TLS
server.ssl.enabled-protocols=TLSv1.2,TLSv1.3
server.ssl.key-store=file:/app/certs/server.p12
server.ssl.key-store-type=PKCS12
server.ssl.key-store-password=changeit
server.ssl.key-alias=medserver
# Require client certificate — mTLS
server.ssl.client-auth=need
server.ssl.trust-store=file:/app/certs/truststore.jks
server.ssl.trust-store-type=JKS
server.ssl.trust-store-password=changeit

# Plain HTTP endpoint is exposed via a secondary Tomcat connector
# on port 8444 (see WebServerConfig) so the React dashboard can poll
# /api/pas/devices/status without presenting a client certificate.
pas.plain-http.port=8444

# ── Database (reuses the existing v4 postgres container) ────────
spring.datasource.url=jdbc:postgresql://postgres:5432/quantixmed_dicom
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# ── MQTT broker (Moquette, embedded) ─────────────────────────────
# These point at the SAME two files used by Tomcat for HTTPS on 8443.
# MqttBrokerBean uses a hand-built SslContext that loads both files
# the same way Spring Boot's Tomcat does.
pas.mqtt.host=0.0.0.0
pas.mqtt.port=8883
pas.mqtt.plain-port=1883
pas.mqtt.keystore=/app/certs/server.p12
pas.mqtt.keystore-password=changeit
pas.mqtt.truststore=/app/certs/truststore.jks
pas.mqtt.truststore-password=changeit
# Self-subscribe client (runs inside the same JVM, loops back to localhost)
pas.mqtt.self-client-id=pas-connector-subscriber

# ── Upload target (shared volume) ────────────────────────────────
pas.upload.dir=/app/uploads

# ── Heartbeat timeout: a device is considered "disconnected"
#    if no heartbeat is received for this many seconds ────────────
pas.device.heartbeat-timeout-seconds=30

# ── Multipart (DICOM zip upload) ─────────────────────────────────
spring.servlet.multipart.max-file-size=2GB
spring.servlet.multipart.max-request-size=2GB
server.tomcat.max-swallow-size=2GB

# ── Logging ──────────────────────────────────────────────────────
logging.level.com.quantixmed=DEBUG
logging.level.io.moquette=INFO
logging.level.org.eclipse.paho=INFO
spring.main.banner-mode=off
