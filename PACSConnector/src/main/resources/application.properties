# Server Configuration
server.port=8443
server.ssl.enabled=true
server.ssl.key-store=classpath:certs/server.p12
server.ssl.key-store-password=dicom
server.ssl.key-store-type=PKCS12
server.ssl.trust-store=classpath:certs/truststore.jks
server.ssl.trust-store-password=dicom2
server.ssl.client-auth=need

spring.application.name=PACSConnector

# File Upload Configuration
spring.servlet.multipart.max-file-size=500MB
spring.servlet.multipart.max-request-size=500MB

# SQLite Database
spring.datasource.url=jdbc:sqlite:pacs-connector.db?journal_mode=WAL&busy_timeout=30000&synchronous=NORMAL
spring.datasource.driver-class-name=org.sqlite.JDBC
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.jpa.database-platform=org.hibernate.community.dialect.SQLiteDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# MQTT Broker (Embedded Moquette)
mqtt.broker.enabled=true
mqtt.broker.port=1883
mqtt.broker.ssl-port=8884
mqtt.broker.wss-port=9001
mqtt.broker.ssl.key-store=classpath:certs/server.p12
mqtt.broker.ssl.key-store-password=dicom
mqtt.broker.ssl.trust-store=classpath:certs/truststore.jks
mqtt.broker.ssl.trust-store-password=dicom2
mqtt.broker.host=0.0.0.0
mqtt.broker.data-dir=./mqtt-data

# MQTT Client (connects to own broker to subscribe to EdgeConnector messages)
mqtt.client.broker.url=wss://localhost:9001/mqtt
mqtt.client.id=PACSConnector-Server
mqtt.client.username=pacs_server
mqtt.client.password=pacs_password
mqtt.client.qos=1

# MQTT Topics to subscribe (from EdgeConnector)
mqtt.topic.connectivity=edge/connectivity/status
mqtt.topic.lwt=edge/connectivity/lwt

# MQTT Authentication (users allowed to connect to broker)
mqtt.auth.edge.username=edge_user
mqtt.auth.edge.password=edge_password
mqtt.auth.pacs.username=pacs_server
mqtt.auth.pacs.password=pacs_password

# DICOM Storage
dicom.storage.folder=src/main/upload
dicom.storage.max-size-mb=10240

# WebSocket
websocket.endpoint=/ws-pacs
websocket.allowed-origins=*

# Logging
logging.level.com.pacs=DEBUG
logging.level.io.moquette=INFO
logging.file.name=logs/pacs-connector.log
logging.file.max-size=10MB
logging.file.max-history=30
