# Disable embedded web server for desktop app
spring.main.web-application-type=none
spring.application.name=EdgeConnectViewer

# EdgeConnector API endpoint (HTTPS with SSL)
edge.connector.url=https://localhost:8444

# SSL/TLS for REST calls to EdgeConnector
ssl.key-store=classpath:certs/client.p12
ssl.key-store-password=dicom
ssl.key-store-type=PKCS12
ssl.trust-store=classpath:certs/truststore.jks
ssl.trust-store-password=dicom2

# Logging
logging.level.com.edge=DEBUG
logging.file.name=logs/edge-viewer.log
